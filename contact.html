<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Ahmad Mohammad Marie</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function validateForm() {
      const name = document.forms["contactForm"]["fullname"].value;
      const email = document.forms["contactForm"]["email"].value;
      const country = document.forms["contactForm"]["country"].value;
      const comments = document.forms["contactForm"]["comments"].value;

      if (name === "" || email === "" || country === "" || comments === "") {
        alert("All fields must be filled out before submission.");
        return false;
      }
      alert("Form submitted successfully!");
      return true;
    }
  </script>
</head>
<body>
  <nav>
    <a href="index.html">Home</a> | 
    <a href="contact.html">Contact Me</a>
  </nav>

  <h1>Contact Me</h1>
  <form name="contactForm" onsubmit="return validateForm()">
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname"><br><br>

    <label for="email">Email Address:</label><br>
    <input type="email" id="email" name="email"><br><br>

    <label for="country">Country:</label><br>
    <input type="text" id="country" name="country"><br><br>

    <label for="comments">Comments:</label><br>
    <textarea id="comments" name="comments"></textarea><br><br>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
